id: java/hardcoded-password-001
name: Hardcoded Password or Secret
severity: high
cwe: CWE-798
languages: [java]
engine: self_sast
detection:
  type: regex
  pattern: 'String\s+(\w*(?:password|secret|apiKey|token|api_key|passwd|pwd|credential|passkey)\w*)\s*=\s*"[^"]*"'
fix:
  description: "Store secrets in environment variables or a secure vault (e.g. HashiCorp Vault, AWS Secrets Manager)"
  example: |
    String password = System.getenv("DB_PASSWORD");
false_positive_scenarios:
  - framework: test-code
    reason: "Test fixtures with fake credentials are acceptable in test directories"
author: security-team
enabled: true
