server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/codesec?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: root123
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

codesec:
  crypto:
    provider: aes  # aes | kms
    master-key: "MTIzNDU2Nzg5MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTI="  # 32-byte base64 key (dev only, used when provider=aes)
    kms:
      region: ${KMS_REGION:cn-hangzhou}
      key-id: ${KMS_KEY_ID:}
  jwt:
    secret: "Y29kZVNlY1BsYXRmb3JtU2VjcmV0S2V5Rm9ySFMyNTY="  # HS256 key (dev only)
    expiration: 86400000  # 24h in ms
  engine:
    sandbox: false

logging:
  level:
    com.codesec: DEBUG

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
