server:
  port: 8080

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/codesec
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

codesec:
  crypto:
    provider: aes  # aes | kms
    master-key: "MTIzNDU2Nzg5MDEyMzQ1Njc4OTAxMjM0NTY3ODkwMTI="  # 32-byte base64 key (dev only, used when provider=aes)
    kms:
      region: ${KMS_REGION:cn-hangzhou}
      key-id: ${KMS_KEY_ID:}
  jwt:
    secret: "Y29kZVNlY1BsYXRmb3JtU2VjcmV0S2V5Rm9ySFMyNTY="  # HS256 key (dev only)
    expiration: 86400000  # 24h in ms
  engine:
    sandbox: false

  cpg:
    enabled: true
    uri: ${NEO4J_URI:bolt://localhost:7687}
    username: ${NEO4J_USERNAME:neo4j}
    password: ${NEO4J_PASSWORD:admin123}

codex:
  api-key: ${CODEX_API_KEY:sk-test-key}
  model: ${CODEX_MODEL:gpt-4o}
  code-model: ${CODEX_CODE_MODEL:gpt-4o}
  llm-model: ${CODEX_LLM_MODEL:gpt-4o}
  capabilities:
    poc-generation: true
    patch-generation: true
    logic-vuln-mining: true

logging:
  level:
    com.codesec: DEBUG

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
