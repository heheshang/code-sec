id: go/hardcoded-password-001
name: Hardcoded Password or Secret (Go)
severity: high
cwe: CWE-798
languages: [go]
engine: self_sast
detection:
  type: regex
  pattern: '(\w*(?:password|secret|apiKey|token|api_key|passwd|pwd|credential|passkey)\w*)\s*[:=]+\s*"([^"]+)"'
fix:
  description: "Store secrets in environment variables or a secure vault (e.g. HashiCorp Vault, AWS Secrets Manager)"
  example: |
    password := os.Getenv("DB_PASSWORD")
false_positive_scenarios:
  - framework: test-code
    reason: "Test fixtures with fake credentials are acceptable in test files"
author: security-team
enabled: true
