# ES Integration Configuration
# code-sec — E-S2-001 ES Full-Text Search

# Elasticsearch connection
es.host=localhost
es.port=9200

# Index naming (single-tenant v1, per L5 fix)
es.index.prefix=codesec

# ES Indexer toggle (global on/off switch)
es.indexer.enabled=true

# IK Analyzer (ik_smart for Chinese tokenization)
# No ngram/edge_ngram — simplified 2-analyzer strategy per MF-4
es.analyzer.default=ik_smart_analyzer
es.analyzer.standard=standard_analyzer
