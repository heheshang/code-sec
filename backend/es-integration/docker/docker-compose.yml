version: '3.8'

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: codesec-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms2g -Xmx4g"
      - cluster.name=codesec-cluster
      - node.name=codesec-es-node-1
      - network.host=0.0.0.0
      - path.repo=["/usr/share/elasticsearch/backup"]
      - path.data=/usr/share/elasticsearch/data/data1,/usr/share/elasticsearch/data/data2,/usr/share/elasticsearch/data/data3
      - bootstrap.memory_lock=true
      - thread_pool.write.queue_size=1000
      - thread_pool.search.queue_size=1000
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9200:9200"
      - "9300:9300"
    volumes:
      - es-data1:/usr/share/elasticsearch/data/data1
      - es-data2:/usr/share/elasticsearch/data/data2
      - es-data3:/usr/share/elasticsearch/data/data3
      - es-backup:/usr/share/elasticsearch/backup
      - ./plugins/ik:/usr/share/elasticsearch/plugins/ik:ro
      - ../config/elasticsearch.yml:/usr/share/elasticsearch/config/elasticsearch.yml:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q 'green\\|yellow'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    restart: unless-stopped

volumes:
  es-data1:
    driver: local
  es-data2:
    driver: local
  es-data3:
    driver: local
  es-backup:
    driver: local
