services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-codesec}
      POSTGRES_USER: ${POSTGRES_USER:-codesec}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-codesec123}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-codesec} -d ${POSTGRES_DB:-codesec}"]
      interval: 5s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    container_name: codesec-es
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms1g -Xmx2g"
      - cluster.name=codesec-cluster
      - bootstrap.memory_lock=true
    ulimits:
      memlock: { soft: -1, hard: -1 }
      nofile: { soft: 65536, hard: 65536 }
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -s http://localhost:9200/_cluster/health | grep -q 'green\\|yellow'"]
      interval: 10s
      timeout: 5s
      retries: 30
      start_period: 60s
    restart: unless-stopped

  backend-api:
    build:
      context: .
      dockerfile: backend/api/Dockerfile
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-codesec}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-codesec}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-codesec123}
      JWT_SECRET: ${JWT_SECRET:-codesec-demo-secret-key-2026}
      ES_HOST: elasticsearch:9200
    depends_on:
      postgres: { condition: service_healthy }
      elasticsearch: { condition: service_healthy }

  backend-worker:
    build:
      context: .
      dockerfile: backend/worker/Dockerfile
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-codesec}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-codesec}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-codesec123}
      JWT_SECRET: ${JWT_SECRET:-codesec-demo-secret-key-2026}
      ES_HOST: elasticsearch:9200
    depends_on:
      postgres: { condition: service_healthy }

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - backend-api

volumes:
  postgres-data:
  es-data:
